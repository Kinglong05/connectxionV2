services:
  - type: web
    name: connectxion-signaling
    runtime: node
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - fromGroup: connectxion-db-secrets
    # Connect to the client app (CORS)
    envVars:
      - key: ALLOWED_ORIGINS
        value: "*" # Change this to your production PHP domain later
